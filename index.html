<!DOCTYPE html>
<html>
<head>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }
    
    /* Header */
    .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #334155;
        z-index: 100;
        padding: 1rem;
    }
    
    .header-content {
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .title {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
    }
    
    .subtitle {
        font-size: 0.875rem;
        color: #64748b;
        margin-bottom: 1rem;
    }
    
    /* Search */
    .search-box {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #1e293b;
        border: 1px solid #475569;
        border-radius: 0.5rem;
        color: #e2e8f0;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
    }
    
    .search-box:focus {
        border-color: #3b82f6;
    }
    
    .search-box::placeholder {
        color: #64748b;
    }
    
    /* Categories */
    .categories {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
        overflow-x: auto;
        padding-bottom: 0.5rem;
        scrollbar-width: none;
    }
    
    .categories::-webkit-scrollbar {
        display: none;
    }
    
    .category-btn {
        padding: 1rem 1.75rem;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 9999px;
        color: #94a3b8;
        font-size: 1.125rem;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
    }
    
    .category-btn:hover {
        background: #334155;
        color: #e2e8f0;
    }
    
    .category-btn.active {
        background: #3b82f6;
        color: white;
        border-color: #3b82f6;
    }
    
    /* Main Content - Scrollable Area */
    .main-content {
        margin-top: 220px;
        padding: 1rem;
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
        padding-bottom: 2rem;
    }
    
    /* Shortcut Cards */
    .shortcuts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 1rem;
    }
    
    .shortcut-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.75rem;
        overflow: hidden;
        transition: all 0.2s;
        cursor: pointer;
    }
    
    .shortcut-card:hover {
        border-color: #3b82f6;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
    
    /* Icon Container */
    .icon-container {
        height: 120px;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        border-bottom: 1px solid #334155;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .icon-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s;
    }
    
    .shortcut-card:hover .icon-container::before {
        opacity: 1;
    }
    
    .shortcut-icon {
        width: 48px;
        height: 48px;
        color: #3b82f6;
        stroke-width: 1.5;
        transition: all 0.3s ease;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
    }
    
    .shortcut-card:hover .shortcut-icon {
        transform: scale(1.1);
        color: #60a5fa;
        filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
    }
    
    /* Category-specific icon colors */
    .category-edit .shortcut-icon { color: #3b82f6; }
    .category-edit .shortcut-card:hover .shortcut-icon { color: #60a5fa; }
    
    .category-miscellaneous .shortcut-icon { color: #22c55e; }
    .category-miscellaneous .shortcut-card:hover .shortcut-icon { color: #4ade80; }
    
    .category-tools .shortcut-icon { color: #a855f7; }
    .category-tools .shortcut-card:hover .shortcut-icon { color: #c084fc; }
    
    .category-navigation .shortcut-icon { color: #f59e0b; }
    .category-navigation .shortcut-card:hover .shortcut-icon { color: #fbbf24; }
    
    .category-file .shortcut-icon { color: #ec4899; }
    .category-file .shortcut-card:hover .shortcut-icon { color: #f472b6; }
    
    .category-view .shortcut-icon { color: #06b6d4; }
    .category-view .shortcut-card:hover .shortcut-icon { color: #22d3ee; }
    
    .category-select .shortcut-icon { color: #14b8a6; }
    .category-select .shortcut-card:hover .shortcut-icon { color: #2dd4bf; }
    
    .category-blockbench .shortcut-icon { color: #ef4444; }
    .category-blockbench .shortcut-card:hover .shortcut-icon { color: #f87171; }
    
    .category-animation .shortcut-icon { color: #8b5cf6; }
    .category-animation .shortcut-card:hover .shortcut-icon { color: #a78bfa; }
    
    .category-uv .shortcut-icon { color: #d946ef; }
    .category-uv .shortcut-card:hover .shortcut-icon { color: #e879f9; }
    
    .category-transform .shortcut-icon { color: #f97316; }
    .category-transform .shortcut-card:hover .shortcut-icon { color: #fb923c; }
    
    .category-textures .shortcut-icon { color: #10b981; }
    .category-textures .shortcut-card:hover .shortcut-icon { color: #34d399; }
    
    .category-layers .shortcut-icon { color: #6366f1; }
    .category-layers .shortcut-card:hover .shortcut-icon { color: #818cf8; }
    
    .category-paint .shortcut-icon { color: #f43f5e; }
    .category-paint .shortcut-card:hover .shortcut-icon { color: #fb7185; }
    
    .category-display .shortcut-icon { color: #84cc16; }
    .category-display .shortcut-card:hover .shortcut-icon { color: #a3e635; }
    
    .category-color .shortcut-icon { color: #e11d48; }
    .category-color .shortcut-card:hover .shortcut-icon { color: #fb7185; }
    
    .card-content {
        padding: 1.25rem;
    }
    
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.75rem;
    }
    
    .shortcut-name {
        font-size: 1.125rem;
        font-weight: 600;
        color: #f8fafc;
    }
    
    .shortcut-category {
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
        background: rgba(59, 130, 246, 0.2);
        color: #60a5fa;
        border-radius: 0.25rem;
        text-transform: uppercase;
        font-weight: 600;
    }
    
    .keys-container {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
    }
    
    .key {
        padding: 0.25rem 0.5rem;
        background: #0f172a;
        border: 1px solid #475569;
        border-radius: 0.375rem;
        font-family: 'Courier New', monospace;
        font-size: 0.875rem;
        font-weight: 700;
        color: #22d3ee;
        box-shadow: 0 2px 0 #0f172a;
    }
    
    .description {
        color: #94a3b8;
        font-size: 0.875rem;
        line-height: 1.5;
        margin-bottom: 0.75rem;
    }
    
    .longform {
        display: none;
        padding-top: 0.75rem;
        border-top: 1px solid #334155;
        margin-top: 0.75rem;
    }
    
    .longform.show {
        display: block;
    }
    
    .longform-label {
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 0.25rem;
    }
    
    .longform-text {
        font-size: 0.875rem;
        color: #cbd5e1;
        line-height: 1.5;
    }
    
    .toggle-btn {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.75rem;
        background: #334155;
        border: none;
        border-radius: 0.375rem;
        color: #94a3b8;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .toggle-btn:hover {
        background: #475569;
        color: #e2e8f0;
    }
    
    /* Empty State */
    .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: #64748b;
    }
    
    .empty-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .shortcuts-grid {
            grid-template-columns: 1fr;
        }
        
        .main-content {
            margin-top: 240px;
        }
    }
    
    /* Total count display */
    .count-display {
        text-align: center;
        padding: 1rem;
        color: #64748b;
        font-size: 0.875rem;
        margin-top: 1rem;
    }
</style>

    async function loadShortcuts() {
        try {
            const res = await fetch('/.netlify/functions/getShortcuts');
            const data = await res.json();
            if (data.shortcuts && data.shortcuts.length > 0) {
                shortcuts = data.shortcuts;
            } else {
                shortcuts = fallbackShortcuts;
            }
            renderShortcuts();
        } catch (e) {
            console.error('Failed to load from Netlify, using fallback', e);
            shortcuts = fallbackShortcuts;
            renderShortcuts();
        }
    }

    let currentCategory = 'all';
    let searchTerm = '';

    function renderShortcuts() {
        const container = document.getElementById('shortcutsContainer');
        const emptyState = document.getElementById('emptyState');
        const countDisplay = document.getElementById('countDisplay');
        
        let filtered = shortcuts.filter(s => {
            let matchesCategory = currentCategory === 'all' || s.category === currentCategory;
            let matchesSearch = searchTerm === '' || 
                s.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                s.keys.join(' ').toLowerCase().includes(searchTerm.toLowerCase()) ||
                s.desc.toLowerCase().includes(searchTerm.toLowerCase());
            
            return matchesCategory && matchesSearch;
        });

        if (filtered.length === 0) {
            container.innerHTML = '';
            emptyState.style.display = 'block';
            countDisplay.textContent = '';
            return;
        }
        
        emptyState.style.display = 'none';
        
        let totalInCategory = currentCategory === 'all' ? shortcuts.length : shortcuts.filter(s => s.category === currentCategory).length;
        countDisplay.textContent = `Showing ${filtered.length} of ${totalInCategory} shortcuts`;
        
        container.innerHTML = filtered.map(s => `
            <div class="shortcut-card category-${s.category}" onclick="toggleLongform(this)">
                <div class="icon-container">
                    <i data-lucide="${s.icon}" class="shortcut-icon"></i>
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <span class="shortcut-name">${s.name}</span>
                        <span class="shortcut-category">${s.category}</span>
                    </div>
                    <div class="keys-container">
                        ${s.keys.length > 0 ? s.keys.map(k => `<span class="key">${k}</span>`).join('') : '<span style="color: #64748b; font-size: 0.875rem;">No shortcut</span>'}
                    </div>
                    <div class="description">${s.desc}</div>
                    <div class="longform">
                        <div class="longform-label">Menu Method</div>
                        <div class="longform-text">${s.category.charAt(0).toUpperCase() + s.category.slice(1)} → ${s.name}</div>
                    </div>
                    <button class="toggle-btn" onclick="event.stopPropagation(); toggleLongform(this.parentElement.parentElement)">
                        Click to see menu method
                    </button>
                </div>
            </div>
        `).join('');
        
        lucide.createIcons();
    }

    function toggleLongform(card) {
        const longform = card.querySelector('.longform');
        const btn = card.querySelector('.toggle-btn');
        
        if (longform.classList.contains('show')) {
            longform.classList.remove('show');
            btn.textContent = 'Click to see menu method';
        } else {
            document.querySelectorAll('.longform').forEach(l => l.classList.remove('show'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = 'Click to see menu method');
            
            longform.classList.add('show');
            btn.textContent = 'Hide menu method';
        }
    }

    function filterCategory(cat) {
        currentCategory = cat;
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.toLowerCase().includes(cat === 'all' ? 'all' : cat)) {
                btn.classList.add('active');
            }
        });
        
        renderShortcuts();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderShortcuts();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement.id !== 'searchInput') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
        
        if (e.key === 'Escape') {
            document.querySelectorAll('.longform').forEach(l => l.classList.remove('show'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = 'Click to see menu method');
            document.getElementById('searchInput').blur();
        }
    });

    // Load from Netlify on startup
    loadShortcuts();
</script>
