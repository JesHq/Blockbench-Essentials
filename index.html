<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbench Essentials</title>
    <style>
/* Header */
.header {
position: fixed;
top: 0;
left: 0;
right: 0;
background: rgba(15, 23, 42, 0.95);
backdrop-filter: blur(10px);
border-bottom: 1px solid #334155;
z-index: 100;
padding: 1rem;
}
.header-content {
max-width: 1200px;
margin: 0 auto;
}
.title {
font-size: 1.5rem;
font-weight: 700;
background: linear-gradient(135deg, #3b82f6, #06b6d4);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 0.5rem;
}
.subtitle {
font-size: 0.875rem;
color: #64748b;
margin-bottom: 1rem;
}
/* Search */
.search-box {
width: 100%;
padding: 0.75rem 1rem;
background: #1e293b;
border: 1px solid #475569;
border-radius: 0.5rem;
color: #e2e8f0;
font-size: 1rem;
outline: none;
transition: border-color 0.2s;
box-sizing: border-box;
}
.search-box:focus {
border-color: #3b82f6;
}
.search-box::placeholder {
color: #64748b;
}
/* Categories */
.categories {
display: flex;
gap: 0.5rem;
margin-top: 1rem;
overflow-x: auto;
padding-bottom: 0.5rem;
scrollbar-width: none;
}
.categories::-webkit-scrollbar {
display: none;
}
.category-btn {
padding: 0.5rem 1.25rem;
background: #1e293b;
border: 1px solid #334155;
border-radius: 9999px;
color: #94a3b8;
font-size: 0.875rem;
cursor: pointer;
white-space: nowrap;
transition: all 0.2s;
font-family: inherit;
}
.category-btn:hover {
background: #334155;
color: #e2e8f0;
}
.category-btn.active {
background: #3b82f6;
color: white;
border-color: #3b82f6;
}
/* Main Content /
.main-content {
margin-top: 180px; / Changed from 200px */
padding: 1rem;
max-width: 1200px;
margin-left: auto;
margin-right: auto;
padding-bottom: 2rem;
}
/* Essential Shortcuts Table */
.essentials-section {
background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(6, 182, 212, 0.1));
border: 1px solid rgba(59, 130, 246, 0.3);
border-radius: 1rem;
padding: 1.5rem;
margin-bottom: 2rem;
}
.essentials-title {
font-size: 1.25rem;
font-weight: 700;
color: #60a5fa;
margin-bottom: 1rem;
display: flex;
align-items: center;
gap: 0.5rem;
}
.essentials-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 0.75rem;
}
.essential-item {
display: flex;
align-items: center;
gap: 0.75rem;
padding: 0.75rem;
background: rgba(15, 23, 42, 0.5);
border-radius: 0.5rem;
border: 1px solid rgba(59, 130, 246, 0.2);
}
.essential-keys {
display: flex;
gap: 0.25rem;
flex-shrink: 0;
}
.essential-key {
padding: 0.25rem 0.5rem;
background: #0f172a;
border: 1px solid #475569;
border-radius: 0.375rem;
font-family: 'Courier New', monospace;
font-size: 0.75rem;
font-weight: 700;
color: #22d3ee;
}
.essential-info {
flex: 1;
}
.essential-name {
font-weight: 600;
color: #f8fafc;
font-size: 0.9rem;
}
.essential-desc {
font-size: 0.75rem;
color: #94a3b8;
}
/* Shortcut Cards */
.shortcuts-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
gap: 1rem;
}
.shortcut-card {
background: #1e293b;
border: 1px solid #334155;
border-radius: 0.75rem;
overflow: hidden;
transition: all 0.2s;
cursor: pointer;
}
.shortcut-card:hover {
border-color: #3b82f6;
transform: translateY(-2px);
box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
}
/* Animation Container - Custom Icons */
.demo-container {
height: 120px;
background: #0f172a;
position: relative;
overflow: hidden;
border-bottom: 1px solid #334155;
display: flex;
align-items: center;
justify-content: center;
}
/* Base Icon Styles */
.icon-base {
position: relative;
width: 40px;
height: 40px;
}
/* Extrude - Box growing outward with depth */
.icon-extrude {
width: 30px;
height: 30px;
background: #3b82f6;
position: relative;
box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
animation: anim-extrude 2s infinite;
}
.icon-extrude::before {
content: '';
position: absolute;
width: 100%;
height: 100%;
background: #60a5fa;
top: -8px;
left: -8px;
opacity: 0.4;
animation: anim-extrude-before 2s infinite;
}
/* Inset - Box shrinking inward with depth */
.icon-inset {
width: 40px;
height: 40px;
border: 3px solid #3b82f6;
position: relative;
animation: anim-inset 2s infinite;
}
.icon-inset::before {
content: '';
position: absolute;
inset: 8px;
background: #3b82f6;
animation: anim-inset-before 2s infinite;
}
/* Loop Cut - Horizontal line slicing through */
.icon-loop {
width: 50px;
height: 40px;
border: 2px solid #3b82f6;
position: relative;
}
.icon-loop::before {
content: '';
position: absolute;
width: 100%;
height: 3px;
background: #22d3ee;
top: 50%;
left: 0;
transform: translateY(-50%);
box-shadow: 0 0 15px #22d3ee;
animation: anim-loop 2s infinite;
}
/* Bevel - Rounded corners morphing */
.icon-bevel {
width: 40px;
height: 40px;
background: #3b82f6;
animation: anim-bevel 2s infinite;
}
/* Merge - Two boxes combining into one */
.icon-merge {
position: relative;
width: 50px;
height: 40px;
}
.icon-merge::before, .icon-merge::after {
content: '';
position: absolute;
width: 20px;
height: 40px;
background: #3b82f6;
top: 0;
animation: anim-merge-1 2s infinite;
}
.icon-merge::before { left: 0; }
.icon-merge::after { right: 0; animation-name: anim-merge-2; }
/* Create Face - Triangle forming with glow */
.icon-create {
width: 0;
height: 0;
border-left: 20px solid transparent;
border-right: 20px solid transparent;
border-bottom: 35px solid #3b82f6;
animation: anim-create 2s infinite;
filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
}
/* Subdivide - Grid pattern subdividing */
.icon-subdivide {
width: 40px;
height: 40px;
background: linear-gradient(90deg, #3b82f6 2px, transparent 2px),
linear-gradient(#3b82f6 2px, transparent 2px);
background-size: 20px 20px;
animation: anim-subdivide 2s infinite;
}
/* Flip - Rotating card 3D */
.icon-flip {
width: 30px;
height: 40px;
background: #3b82f6;
position: relative;
transform-style: preserve-3d;
animation: anim-flip 2s infinite;
}
.icon-flip::before {
content: '';
position: absolute;
width: 100%;
height: 100%;
background: #ef4444;
backface-visibility: hidden;
transform: rotateY(180deg);
}
/* Smooth - Morphing circle with pulse */
.icon-smooth {
width: 40px;
height: 40px;
background: #3b82f6;
animation: anim-smooth 2s infinite;
}
/* Hide - Fading out with shrink */
.icon-hide {
width: 40px;
height: 40px;
background: #3b82f6;
animation: anim-hide 2s infinite;
}
/* X-Ray - See through with scan effect */
.icon-xray {
width: 40px;
height: 40px;
border: 2px solid #3b82f6;
position: relative;
animation: anim-xray 2s infinite;
}
.icon-xray::before {
content: '';
position: absolute;
inset: 5px;
background: #3b82f6;
opacity: 0.5;
}
/* Select - Highlight ring with pulse */
.icon-select {
width: 40px;
height: 40px;
border: 3px solid #22d3ee;
position: relative;
animation: anim-select 2s infinite;
}
.icon-select::before {
content: '';
position: absolute;
inset: 5px;
background: #3b82f6;
}
/* Grow - Expanding selection with rings */
.icon-grow {
width: 20px;
height: 20px;
background: #3b82f6;
position: relative;
animation: anim-grow 2s infinite;
}
.icon-grow::before {
content: '';
position: absolute;
inset: -10px;
border: 2px solid #22d3ee;
opacity: 0;
animation: anim-grow-ring 2s infinite;
}
/* Bridge - Connecting lines with arc */
.icon-bridge {
position: relative;
width: 50px;
height: 40px;
}
.icon-bridge::before, .icon-bridge::after {
content: '';
position: absolute;
width: 2px;
height: 100%;
background: #3b82f6;
animation: anim-bridge-1 2s infinite;
}
.icon-bridge::before { left: 5px; }
.icon-bridge::after { right: 5px; animation-name: anim-bridge-2; }
.icon-bridge span {
position: absolute;
top: 50%;
left: 5px;
right: 5px;
height: 2px;
background: #22d3ee;
transform: translateY(-50%) scaleX(0);
animation: anim-bridge-connect 2s infinite;
}
/* Rip - Tearing effect with separation */
.icon-rip {
width: 40px;
height: 40px;
background: #3b82f6;
position: relative;
clip-path: polygon(0 0, 45% 0, 55% 100%, 0 100%);
animation: anim-rip 2s infinite;
}
.icon-rip::before {
content: '';
position: absolute;
right: -10px;
top: 0;
width: 40px;
height: 40px;
background: #3b82f6;
opacity: 0.5;
clip-path: polygon(45% 0, 100% 0, 100% 100%, 55% 100%);
animation: anim-rip-piece 2s infinite;
}
/* Separate - Splitting apart with gap */
.icon-separate {
position: relative;
width: 50px;
height: 40px;
}
.icon-separate::before, .icon-separate::after {
content: '';
position: absolute;
width: 20px;
height: 40px;
background: #3b82f6;
top: 0;
}
.icon-separate::before { left: 0; animation: anim-separate-1 2s infinite; }
.icon-separate::after { right: 0; animation: anim-separate-2 2s infinite; }
/* Symmetrize - Mirroring with reflection */
.icon-symmetrize {
position: relative;
width: 50px;
height: 40px;
}
.icon-symmetrize::before, .icon-symmetrize::after {
content: '';
position: absolute;
width: 20px;
height: 40px;
background: #3b82f6;
top: 0;
}
.icon-symmetrize::before { left: 5px; animation: anim-sym-left 2s infinite; }
.icon-symmetrize::after { right: 5px; animation: anim-sym-right 2s infinite; }
.icon-symmetrize span {
position: absolute;
left: 50%;
top: 0;
bottom: 0;
width: 2px;
background: #22d3ee;
transform: translateX(-50%);
}
/* Mirror - Reflecting with flip */
.icon-mirror {
width: 40px;
height: 40px;
background: #3b82f6;
position: relative;
animation: anim-mirror 2s infinite;
}
.icon-mirror::before {
content: '';
position: absolute;
left: 50%;
top: 0;
bottom: 0;
width: 2px;
background: #22d3ee;
}
/* Brush - Circular brush with stroke effect */
.icon-brush {
width: 30px;
height: 30px;
border-radius: 50%;
background: radial-gradient(circle, #22d3ee 30%, #3b82f6 70%);
animation: anim-brush 2s infinite;
box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
}
/* Bucket - Fill pouring with liquid */
.icon-bucket {
width: 30px;
height: 35px;
background: #3b82f6;
clip-path: polygon(20% 0%, 80% 0%, 100% 40%, 100% 100%, 0% 100%, 0% 40%);
position: relative;
animation: anim-bucket 2s infinite;
}
.icon-bucket::before {
content: '';
position: absolute;
bottom: 0;
left: 0;
right: 0;
height: 0%;
background: #ef4444;
animation: anim-bucket-fill 2s infinite;
}
/* Eraser - Wiping with fade */
.icon-erase {
width: 35px;
height: 20px;
background: linear-gradient(90deg, #64748b 50%, #f59e0b 50%);
border-radius: 3px;
position: relative;
animation: anim-erase 2s infinite;
}
/* Picker - Eyedropper with color sample */
.icon-picker {
width: 8px;
height: 30px;
background: #cbd5e1;
position: relative;
transform: rotate(45deg);
animation: anim-picker 2s infinite;
}
.icon-picker::before {
content: '';
position: absolute;
top: -8px;
left: -4px;
width: 16px;
height: 16px;
border-radius: 50%;
border: 3px solid #3b82f6;
background: #22c55e;
}
/* UV - Unwrapping with rotation */
.icon-uv {
width: 40px;
height: 40px;
border: 2px dashed #22d3ee;
position: relative;
animation: anim-uv 2s infinite;
}
.icon-uv::before {
content: '';
position: absolute;
inset: 5px;
background: rgba(59, 130, 246, 0.3);
}
/* Size - Scaling circle with pulse */
.icon-size {
width: 20px;
height: 20px;
border-radius: 50%;
border: 3px solid #3b82f6;
animation: anim-size 2s infinite;
}
/* Keyframe - Diamond marker with glow */
.icon-keyframe {
width: 20px;
height: 20px;
background: #f59e0b;
transform: rotate(45deg);
animation: anim-keyframe 2s infinite;
box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
}
/* Play - Triangle with pulse */
.icon-play {
width: 0;
height: 0;
border-top: 15px solid transparent;
border-bottom: 15px solid transparent;
border-left: 25px solid #22c55e;
animation: anim-play 2s infinite;
filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.5));
}
/* Next - Arrow right with bounce */
.icon-next {
width: 30px;
height: 20px;
position: relative;
animation: anim-next 2s infinite;
}
.icon-next::before {
content: '';
position: absolute;
left: 0;
top: 50%;
width: 20px;
height: 4px;
background: #3b82f6;
transform: translateY(-50%);
}
.icon-next::after {
content: '';
position: absolute;
right: 0;
top: 50%;
width: 0;
height: 0;
border-top: 8px solid transparent;
border-bottom: 8px solid transparent;
border-left: 12px solid #3b82f6;
transform: translateY(-50%);
}
/* Wireframe - Grid cube with pulse */
.icon-wireframe {
width: 35px;
height: 35px;
border: 2px solid #3b82f6;
position: relative;
animation: anim-wireframe 2s infinite;
}
.icon-wireframe::before {
content: '';
position: absolute;
inset: 5px;
border: 1px solid #22d3ee;
}
/* Grid - Lines with fade */
.icon-grid {
width: 40px;
height: 40px;
background-image: linear-gradient(#334155 1px, transparent 1px),
linear-gradient(90deg, #334155 1px, transparent 1px);
background-size: 10px 10px;
animation: anim-grid 2s infinite;
}
/* Focus - Target with zoom */
.icon-focus {
width: 40px;
height: 40px;
border: 3px solid #3b82f6;
border-radius: 50%;
position: relative;
animation: anim-focus 2s infinite;
}
.icon-focus::before {
content: '';
position: absolute;
inset: 10px;
background: #3b82f6;
border-radius: 50%;
}
.icon-focus::after {
content: '';
position: absolute;
top: 50%;
left: -10px;
right: -10px;
height: 2px;
background: #22d3ee;
transform: translateY(-50%);
}
/* Sidebar - Panel sliding */
.icon-sidebar {
width: 40px;
height: 30px;
border: 2px solid #3b82f6;
position: relative;
animation: anim-sidebar 2s infinite;
}
.icon-sidebar::before {
content: '';
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 30%;
background: #3b82f6;
}
/* View - Camera perspective shift */
.icon-view {
width: 40px;
height: 30px;
background: #1e293b;
border: 2px solid #3b82f6;
position: relative;
transform: perspective(100px) rotateX(0deg);
animation: anim-view 2s infinite;
}
/* Move - Arrows with directional movement */
.icon-move {
position: relative;
width: 40px;
height: 40px;
}
.icon-move::before, .icon-move::after {
content: '';
position: absolute;
background: #3b82f6;
}
.icon-move::before {
width: 30px;
height: 4px;
top: 50%;
left: 5px;
transform: translateY(-50%);
animation: anim-move-h 2s infinite;
}
.icon-move::after {
width: 4px;
height: 30px;
left: 50%;
top: 5px;
transform: translateX(-50%);
animation: anim-move-v 2s infinite;
}
/* Scale - Resizing box with corner */
.icon-scale {
width: 30px;
height: 30px;
border: 3px solid #3b82f6;
position: relative;
animation: anim-scale 2s infinite;
}
.icon-scale::before {
content: '';
position: absolute;
right: -5px;
bottom: -5px;
width: 10px;
height: 10px;
background: #22d3ee;
}
/* Rotate - Circular arrow with spin */
.icon-rotate {
width: 40px;
height: 40px;
border: 3px solid #3b82f6;
border-radius: 50%;
border-top-color: transparent;
position: relative;
animation: anim-rotate 2s linear infinite;
}
.icon-rotate::before {
content: '';
position: absolute;
top: -3px;
left: 50%;
transform: translateX(-50%);
width: 0;
height: 0;
border-left: 6px solid transparent;
border-right: 6px solid transparent;
border-bottom: 8px solid #3b82f6;
}
/* Pivot - Crosshair with center pulse */
.icon-pivot {
width: 40px;
height: 40px;
position: relative;
animation: anim-pivot 2s infinite;
}
.icon-pivot::before, .icon-pivot::after {
content: '';
position: absolute;
background: #3b82f6;
}
.icon-pivot::before {
width: 100%;
height: 2px;
top: 50%;
transform: translateY(-50%);
}
.icon-pivot::after {
width: 2px;
height: 100%;
left: 50%;
transform: translateX(-50%);
}
.icon-pivot span {
position: absolute;
width: 8px;
height: 8px;
background: #f59e0b;
border-radius: 50%;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
}
/* Snap - Magnet with attraction */
.icon-snap {
width: 25px;
height: 35px;
background: #ef4444;
clip-path: polygon(20% 0%, 80% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%);
position: relative;
animation: anim-snap 2s infinite;
}
/* Measure - Ruler with extending */
.icon-measure {
width: 50px;
height: 12px;
background: linear-gradient(90deg, #3b82f6 0%, #3b82f6 90%, transparent 90%);
position: relative;
border: 1px solid #3b82f6;
animation: anim-measure 2s infinite;
}
.icon-measure::before {
content: '';
position: absolute;
top: -5px;
left: 10%;
width: 1px;
height: 10px;
background: #22d3ee;
box-shadow: 10px 0 0 #22d3ee, 20px 0 0 #22d3ee, 30px 0 0 #22d3ee;
}
/* Toggle - Switch with slide */
.icon-toggle {
width: 50px;
height: 26px;
background: #334155;
border-radius: 13px;
position: relative;
animation: anim-toggle-bg 2s infinite;
}
.icon-toggle::before {
content: '';
position: absolute;
width: 22px;
height: 22px;
background: #e2e8f0;
border-radius: 50%;
top: 2px;
left: 2px;
animation: anim-toggle 2s infinite;
}
/* Export - Outgoing arrow with movement */
.icon-export {
width: 35px;
height: 35px;
position: relative;
animation: anim-export 2s infinite;
}
.icon-export::before {
content: '';
position: absolute;
width: 20px;
height: 20px;
border: 3px solid #3b82f6;
right: 0;
top: 50%;
transform: translateY(-50%);
}
.icon-export::after {
content: '';
position: absolute;
left: 0;
top: 50%;
transform: translateY(-50%);
width: 0;
height: 0;
border-top: 8px solid transparent;
border-bottom: 8px solid transparent;
border-right: 12px solid #ef4444;
}
/* Import - Incoming arrow with movement */
.icon-import {
width: 35px;
height: 35px;
position: relative;
animation: anim-import 2s infinite;
}
.icon-import::before {
content: '';
position: absolute;
width: 20px;
height: 20px;
border: 3px solid #3b82f6;
left: 0;
top: 50%;
transform: translateY(-50%);
}
.icon-import::after {
content: '';
position: absolute;
right: 0;
top: 50%;
transform: translateY(-50%);
width: 0;
height: 0;
border-top: 8px solid transparent;
border-bottom: 8px solid transparent;
border-left: 12px solid #22c55e;
}
/* JSON - Braces with type effect */
.icon-json {
font-family: 'Courier New', monospace;
font-size: 28px;
font-weight: bold;
color: #eab308;
animation: anim-json 2s infinite;
}
/* Optimize - Compress with squeeze */
.icon-optimize {
width: 40px;
height: 40px;
border: 2px solid #3b82f6;
position: relative;
animation: anim-optimize 2s infinite;
}
.icon-optimize::before {
content: '';
position: absolute;
inset: 5px;
border: 2px solid #22d3ee;
}
/* Backup - Save stack with bounce */
.icon-backup {
position: relative;
width: 35px;
height: 40px;
}
.icon-backup::before, .icon-backup::after {
content: '';
position: absolute;
width: 100%;
height: 12px;
background: #3b82f6;
left: 0;
}
.icon-backup::before { top: 0; animation: anim-backup-1 2s infinite; }
.icon-backup::after { bottom: 0; animation: anim-backup-2 2s infinite; }
.icon-backup span {
position: absolute;
width: 100%;
height: 12px;
background: #22c55e;
top: 50%;
transform: translateY(-50%);
animation: anim-backup-3 2s infinite;
}
/* Recent - Clock with ticking */
.icon-recent {
width: 40px;
height: 40px;
border: 3px solid #3b82f6;
border-radius: 50%;
position: relative;
animation: anim-recent 2s infinite;
}
.icon-recent::before {
content: '';
position: absolute;
width: 2px;
height: 12px;
background: #22d3ee;
top: 50%;
left: 50%;
transform-origin: bottom center;
transform: translateX(-50%) rotate(0deg);
animation: anim-clock-hand 2s infinite;
}
/* Close - X with rotation */
.icon-close {
width: 35px;
height: 35px;
position: relative;
animation: anim-close 2s infinite;
}
.icon-close::before, .icon-close::after {
content: '';
position: absolute;
width: 100%;
height: 4px;
background: #ef4444;
top: 50%;
left: 0;
transform-origin: center;
}
.icon-close::before { transform: translateY(-50%) rotate(45deg); }
.icon-close::after { transform: translateY(-50%) rotate(-45deg); }
/* Quit - Door with exit */
.icon-quit {
width: 30px;
height: 40px;
border: 3px solid #ef4444;
position: relative;
animation: anim-quit 2s infinite;
}
.icon-quit::before {
content: '';
position: absolute;
width: 8px;
height: 8px;
background: #ef4444;
border-radius: 50%;
right: 5px;
top: 50%;
transform: translateY(-50%);
}
/* Cut - Scissors with snip */
.icon-cut {
width: 40px;
height: 40px;
position: relative;
animation: anim-cut 2s infinite;
}
.icon-cut::before, .icon-cut::after {
content: '';
position: absolute;
width: 25px;
height: 4px;
background: #f59e0b;
top: 50%;
left: 50%;
transform-origin: left center;
}
.icon-cut::before { transform: translate(-50%, -50%) rotate(30deg); }
.icon-cut::after { transform: translate(-50%, -50%) rotate(-30deg); }
/* Copy - Duplicate with slide */
.icon-copy {
width: 25px;
height: 30px;
background: #3b82f6;
position: relative;
animation: anim-copy 2s infinite;
}
.icon-copy::before {
content: '';
position: absolute;
width: 100%;
height: 100%;
background: rgba(59, 130, 246, 0.5);
top: -8px;
right: -8px;
border: 2px solid #22d3ee;
}
/* Paste - Clipboard with drop */
.icon-paste {
width: 30px;
height: 35px;
background: #3b82f6;
position: relative;
animation: anim-paste 2s infinite;
}
.icon-paste::before {
content: '';
position: absolute;
width: 40%;
height: 8px;
background: #1e293b;
top: -4px;
left: 30%;
border-radius: 2px;
}
/* History - Stack with wave */
.icon-history {
position: relative;
width: 40px;
height: 40px;
}
.icon-history::before, .icon-history::after {
content: '';
position: absolute;
width: 100%;
height: 8px;
background: #3b82f6;
left: 0;
}
.icon-history::before { top: 5px; animation: anim-history-1 2s infinite; }
.icon-history::after { bottom: 5px; animation: anim-history-2 2s infinite; }
.icon-history span {
position: absolute;
width: 100%;
height: 8px;
background: #22d3ee;
top: 50%;
transform: translateY(-50%);
animation: anim-history-3 2s infinite;
}
/* Search - Magnifying glass with pulse */
.icon-search {
width: 25px;
height: 25px;
border: 3px solid #3b82f6;
border-radius: 50%;
position: relative;
animation: anim-search 2s infinite;
}
.icon-search::before {
content: '';
position: absolute;
width: 3px;
height: 12px;
background: #3b82f6;
bottom: -8px;
right: -3px;
transform: rotate(-45deg);
}
/* Find - Target with lock */
.icon-find {
width: 35px;
height: 35px;
border: 3px solid #22c55e;
border-radius: 50%;
position: relative;
animation: anim-find 2s infinite;
}
.icon-find::before {
content: '';
position: absolute;
inset: 8px;
background: #22c55e;
border-radius: 50%;
opacity: 0.5;
}
/* Replace - Exchange with swap */
.icon-replace {
position: relative;
width: 45px;
height: 30px;
}
.icon-replace::before, .icon-replace::after {
content: '';
position: absolute;
width: 0;
height: 0;
}
.icon-replace::before {
border-top: 10px solid transparent;
border-bottom: 10px solid transparent;
border-left: 15px solid #ef4444;
left: 0;
top: 50%;
transform: translateY(-50%);
animation: anim-replace-1 2s infinite;
}
.icon-replace::after {
border-top: 10px solid transparent;
border-bottom: 10px solid transparent;
border-right: 15px solid #22c55e;
right: 0;
top: 50%;
transform: translateY(-50%);
animation: anim-replace-2 2s infinite;
}
/* Select All - Star burst with spin */
.icon-selectall {
width: 30px;
height: 30px;
background: #f59e0b;
clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
animation: anim-selectall 2s infinite;
}
/* Deselect - Fading star with shrink */
.icon-deselect {
width: 30px;
height: 30px;
background: #64748b;
clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
animation: anim-deselect 2s infinite;
}
/* Random - Dice with roll */
.icon-random {
width: 30px;
height: 30px;
background: #a855f7;
border-radius: 4px;
position: relative;
animation: anim-random 2s infinite;
}
.icon-random::before {
content: '';
position: absolute;
width: 6px;
height: 6px;
background: white;
border-radius: 50%;
top: 6px;
left: 6px;
box-shadow: 12px 0 0 white, 0 12px 0 white, 12px 12px 0 white;
}
/* Border - Frame with glow */
.icon-border {
width: 40px;
height: 40px;
border: 3px solid #3b82f6;
position: relative;
animation: anim-border 2s infinite;
}
.icon-border::before {
content: '';
position: absolute;
inset: 5px;
border: 2px dashed #22d3ee;
}
/* Sharp - Lightning with flash */
.icon-sharp {
width: 25px;
height: 40px;
background: #f59e0b;
clip-path: polygon(40% 0%, 100% 50%, 40% 50%, 60% 100%, 0% 50%, 60% 50%);
animation: anim-sharp 2s infinite;
}
/* Linked - Chain with clink */
.icon-linked {
position: relative;
width: 45px;
height: 20px;
}
.icon-linked::before, .icon-linked::after {
content: '';
position: absolute;
width: 20px;
height: 20px;
border: 4px solid #3b82f6;
border-radius: 50%;
top: 0;
}
.icon-linked::before { left: 0; animation: anim-linked-1 2s infinite; }
.icon-linked::after { right: 0; animation: anim-linked-2 2s infinite; }
/* Similar - Similar shapes with compare */
.icon-similar {
position: relative;
width: 50px;
height: 40px;
}
.icon-similar::before, .icon-similar::after {
content: '';
position: absolute;
background: #3b82f6;
top: 50%;
transform: translateY(-50%);
}
.icon-similar::before {
width: 20px;
height: 20px;
left: 5px;
}
.icon-similar::after {
width: 15px;
height: 15px;
right: 5px;
opacity: 0.7;
}
/* Axis - XYZ with rotation */
.icon-axis {
position: relative;
width: 40px;
height: 40px;
}
.icon-axis::before {
content: 'XYZ';
position: absolute;
font-family: 'Courier New', monospace;
font-size: 14px;
font-weight: bold;
color: #ef4444;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
animation: anim-axis 2s infinite;
text-shadow: 2px 2px 0 #22c55e, -2px -2px 0 #3b82f6;
}
/* Cursor - Crosshair with blink */
.icon-cursor {
width: 40px;
height: 40px;
position: relative;
animation: anim-cursor 2s infinite;
}
.icon-cursor::before, .icon-cursor::after {
content: '';
position: absolute;
background: #f59e0b;
}
.icon-cursor::before {
width: 100%;
height: 2px;
top: 50%;
transform: translateY(-50%);
}
.icon-cursor::after {
width: 2px;
height: 100%;
left: 50%;
transform: translateX(-50%);
}
/* Origin - Center point with ripple */
.icon-origin {
width: 40px;
height: 40px;
position: relative;
animation: anim-origin 2s infinite;
}
.icon-origin::before {
content: '';
position: absolute;
width: 12px;
height: 12px;
background: #f59e0b;
border-radius: 50%;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.3), 0 0 0 8px rgba(245, 158, 11, 0.1);
}
/* Snap Grid - Grid with magnet snap */
.icon-snapgrid {
width: 40px;
height: 40px;
background-image: linear-gradient(#334155 1px, transparent 1px),
linear-gradient(90deg, #334155 1px, transparent 1px);
background-size: 8px 8px;
position: relative;
animation: anim-snapgrid 2s infinite;
}
.icon-snapgrid::before {
content: '';
position: absolute;
width: 10px;
height: 10px;
background: #ef4444;
border-radius: 2px;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
}
/* Vertex - Dot with pulse */
.icon-vertex {
width: 12px;
height: 12px;
background: #3b82f6;
border-radius: 50%;
box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
animation: anim-vertex 2s infinite;
}
/* Edge - Line with extend */
.icon-edge {
width: 40px;
height: 4px;
background: #3b82f6;
animation: anim-edge 2s infinite;
}
/* Face - Square with highlight */
.icon-face {
width: 30px;
height: 30px;
background: #3b82f6;
animation: anim-face 2s infinite;
}
/* Mesh - 3D cube wireframe rotate */
.icon-mesh {
width: 30px;
height: 30px;
border: 2px solid #3b82f6;
position: relative;
transform: rotateX(45deg) rotateY(45deg);
transform-style: preserve-3d;
animation: anim-mesh 3s infinite linear;
}
/* Texture - Checkerboard with shift */
.icon-texture {
width: 40px;
height: 40px;
background: repeating-conic-gradient(#3b82f6 0% 25%, #1e293b 0% 50%);
background-size: 10px 10px;
animation: anim-texture 2s infinite;
}
/* Material - Shiny sphere with gleam */
.icon-material {
width: 35px;
height: 35px;
border-radius: 50%;
background: radial-gradient(circle at 30% 30%, #60a5fa, #3b82f6, #1e3a8a);
animation: anim-material 2s infinite;
}
/* Outliner - List with items */
.icon-outliner {
width: 35px;
height: 40px;
position: relative;
}
.icon-outliner::before, .icon-outliner::after {
content: '';
position: absolute;
left: 0;
height: 8px;
background: #3b82f6;
}
.icon-outliner::before {
width: 100%;
top: 5px;
}
.icon-outliner::after {
width: 70%;
bottom: 5px;
}
/* Properties - Sliders with adjust */
.icon-properties {
width: 35px;
height: 40px;
position: relative;
}
.icon-properties::before, .icon-properties::after {
content: '';
position: absolute;
left: 0;
height: 6px;
background: #3b82f6;
border-radius: 3px;
}
.icon-properties::before {
width: 100%;
top: 8px;
}
.icon-properties::after {
width: 60%;
bottom: 8px;
}
/* Timeline - Film strip with scroll */
.icon-timeline {
width: 45px;
height: 30px;
background: #1e293b;
border: 2px solid #3b82f6;
position: relative;
animation: anim-timeline 2s infinite;
}
.icon-timeline::before, .icon-timeline::after {
content: '';

width: 4px;
height: 100%;
background: repeating-linear-gradient(to bottom, #3b82f6 0px, #3b82f6 4px, transparent 4px, transparent 8px);
}
.icon-timeline::before { left: 3px; }
.icon-timeline::after { right: 3px; }
/* Dope Sheet - Keyframes with bounce */
.icon-dope {
position: relative;
width: 45px;
height: 40px;
}
.icon-dope::before, .icon-dope::after {
content: '';
position: absolute;
width: 8px;
height: 8px;
background: #f59e0b;
transform: rotate(45deg);
}
.icon-dope::before { left: 5px; top: 10px; animation: anim-dope-1 2s infinite; }
.icon-dope::after { right: 5px; bottom: 10px; animation: anim-dope-2 2s infinite; }
/* NLA - Layers with shift */
.icon-nla {
position: relative;
width: 40px;
height: 40px;
}
.icon-nla::before, .icon-nla::after {
content: '';
position: absolute;
width: 100%;
height: 10px;
background: #3b82f6;
left: 0;
}
.icon-nla::before { top: 5px; animation: anim-nla-1 2s infinite; }
.icon-nla::after { bottom: 5px; animation: anim-nla-2 2s infinite; }
/* Text Editor - Lines with typing */
.icon-texteditor {
width: 35px;
height: 40px;
position: relative;
}
.icon-texteditor::before {
content: '';
position: absolute;
width: 100%;
height: 2px;
background: #3b82f6;
top: 10px;
box-shadow: 0 8px 0 #3b82f6, 0 16px 0 #3b82f6;
animation: anim-text 2s infinite;
}
/* Python - Snake with slither */
.icon-python {
width: 35px;
height: 35px;
background: #eab308;
position: relative;
clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 50% 50%, 50% 100%, 0% 100%);
animation: anim-python 2s infinite;
}
/* Info - Letter i with bounce */
.icon-info {
width: 30px;
height: 30px;
background: #3b82f6;

animation: anim-info 2s infinite;
}
.icon-info::before {

position: absolute;
color: white;

font-size: 20px;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
}
/* Toolbar - Tools with wiggle */
.icon-toolbar {
width: 35px;
height: 35px;
position: relative;
}
.icon-toolbar::before {
content: '🔧';
font-size: 24px;
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
animation: anim-toolbar 2s infinite;
}
/* Status - Bar with progress */
.icon-status {
width: 50px;
height: 8px;
background: #22c55e;
border-radius: 4px;

animation: anim-status 2s infinite;
}
.icon-status::before {
content: '';

width: 30%;
height: 100%;

/* Area - Split screen with slide */
.icon-area {
width: 40px;
height: 40px;
border: 2px solid #3b82f6;

}
.icon-area::before {
content: '';
position: absolute;

height: 100%;
background: rgba(59, 130, 246, 0.3);

top: 0;
animation: anim-area 2s infinite;
}
/* Split - Dividing with line */
.icon-split {
width: 40px;
height: 40px;
border: 2px solid #3b82f6;

}
.icon-split::before {
content: '';
position: absolute;

height: 100%;
background: #22d3ee;

}
/* Join - Combining with merge */
.icon-join {
width: 40px;
height: 40px;
border: 2px solid #3b82f6;
position: relative;
animation: anim-join 2s infinite;
}
.icon-join::before {

position: absolute;
width: 2px;
height: 100%;
background: #ef4444;
left: 50%;
transform: translateX(-50%);
}
/* Swap - Exchange with flip */
.icon-swap {
position: relative;
width: 45px;
height: 30px;
}
.icon-swap::before, .icon-swap::after {
content: '';
position: absolute;
width: 20px;
height: 20px;
background: #3b82f6;
top: 50%;
transform: translateY(-50%);
}
.icon-swap::before { left: 0; animation: anim-swap-1 2s infinite; }
.icon-swap::after { right: 0; animation: anim-swap-2 2s infinite; }
/* Quad - Four squares with pulse */
.icon-quad {
width: 40px;
height: 40px;
position: relative;
}
.icon-quad::before {
content: '';
position: absolute;
width: 100%;
height: 100%;
background: linear-gradient(to right, transparent 48%, #3b82f6 48%, #3b82f6 52%, transparent 52%),
linear-gradient(to bottom, transparent 48%, #3b82f6 48%, #3b82f6 52%, transparent 52%);
animation: anim-quad 2s infinite;
}
/* Maximize - Expand with grow */
.icon-max {
width: 30px;
height: 30px;
border: 3px solid #22c55e;
position: relative;
animation: anim-max 2s infinite;
}
.icon-max::before {
content: '';
position: absolute;
inset: -10px;
border: 2px dashed #3b82f6;
opacity: 0.5;
}
/* Minimize - Contract with shrink */
.icon-min {
width: 30px;

border: 3px solid #ef4444;
position: relative;
animation: anim-min 2s infinite;
}
/* Screen - Monitor with flicker */

}
/* Scene - 3D cube with rotate */

width: 30px;

}
.icon-viewselected::before {

}
.icon-viewselected::after {

/* View Center - Crosshair with focus */

50% { transform: rotateY(180deg) rotateX(20deg); }
}
@keyframes anim-lock {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.5; transform: scale(0.9); }
}
@keyframes anim-clear {
0%, 100% { opacity: 1; transform: scale(1); filter: blur(0); }
50% { opacity: 0.1; transform: scale(0.9); filter: blur(4px); }
}
@keyframes anim-fill {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.4); }
}
@keyframes anim-auto {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.7; transform: scale(1.15); }
}
@keyframes anim-marker {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-8px); }
}
@keyframes anim-clearline {
0%, 100% { width: 40px; opacity: 1; }
50% { width: 0; opacity: 0; }
}
@keyframes anim-new {
0% { transform: scale(0) rotate(-180deg); opacity: 0; }
70% { transform: scale(1.1) rotate(10deg); opacity: 1; }
100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes anim-open {
0%, 100% { opacity: 1; transform: translateY(0); }
50% { opacity: 0.7; transform: translateY(-3px); }
}
@keyframes anim-prefs {
0%, 100% { transform: rotate(0deg); }
25% { transform: rotate(10deg); }
75% { transform: rotate(-10deg); }
}
@keyframes anim-undo {
0%, 100% { transform: translateX(0); }
50% { transform: translateX(-8px); }
}
@keyframes anim-redo {
0%, 100% { transform: translateX(0); }
50% { transform: translateX(8px); }
}
@keyframes anim-dup-1 {
0%, 100% { transform: translateX(0); opacity: 1; }
50% { transform: translateX(-8px); opacity: 0.8; }
}
@keyframes anim-dup-2 {
0%, 100% { transform: translateX(0); opacity: 0.6; }
50% { transform: translateX(8px); opacity: 0.8; }
}
@keyframes anim-screenshot {
0%, 100% { opacity: 1; }
50% { opacity: 0.8; }
}
@keyframes anim-flash {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0; transform: scale(2); }
}
@keyframes anim-save {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.7; transform: scale(0.95); }
}
@keyframes anim-invert {
0%, 100% { filter: hue-rotate(0deg) brightness(1); }
50% { filter: hue-rotate(180deg) brightness(1.2); }
}
@keyframes anim-default {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.7; transform: scale(0.95); }
}
/* Card Content */
.card-content {
padding: 1.25rem;
}
.card-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 0.75rem;
}
.shortcut-name {
font-size: 1.125rem;
font-weight: 600;
color: #f8fafc;
}
.shortcut-category {
font-size: 0.75rem;
padding: 0.25rem 0.5rem;
background: rgba(59, 130, 246, 0.2);
color: #60a5fa;
border-radius: 0.25rem;
text-transform: uppercase;
font-weight: 600;
}
.keys-container {
display: flex;
gap: 0.25rem;
margin-bottom: 0.75rem;
flex-wrap: wrap;
}
.key {
padding: 0.25rem 0.5rem;
background: #0f172a;
border: 1px solid #475569;
border-radius: 0.375rem;
font-family: 'Courier New', monospace;
font-size: 0.875rem;
font-weight: 700;
color: #22d3ee;
box-shadow: 0 2px 0 #0f172a;
}
.description {
color: #94a3b8;
font-size: 0.875rem;
line-height: 1.5;
margin-bottom: 0.75rem;
}
.longform {
display: none;
padding-top: 0.75rem;
border-top: 1px solid #334155;
margin-top: 0.75rem;
}
.longform.show {
display: block;
}
.longform-label {
font-size: 0.75rem;
color: #64748b;
text-transform: uppercase;
font-weight: 600;
margin-bottom: 0.25rem;
}
.longform-text {
font-size: 0.875rem;
color: #cbd5e1;
line-height: 1.5;
}
.toggle-btn {
width: 100%;
padding: 0.5rem;
margin-top: 0.75rem;
background: #334155;
border: none;
border-radius: 0.375rem;
color: #94a3b8;
font-size: 0.875rem;
cursor: pointer;
transition: all 0.2s;
font-family: inherit;
}
.toggle-btn:hover {
background: #475569;
color: #e2e8f0;
}
/* Empty State */
.empty-state {
text-align: center;
padding: 4rem 2rem;
color: #64748b;
}
.empty-icon {
font-size: 3rem;
margin-bottom: 1rem;
}
/* Responsive */
@media (max-width: 768px) {
.shortcuts-grid {
grid-template-columns: 1fr;
}
.main-content {
    margin-top: 180px; /* Changed from 200px */
}

.essentials-grid {
    grid-template-columns: 1fr;
}

}    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="title">Blockbench Essentials</h1>
            <p class="subtitle">Most useful shortcuts for Blockbench</p>
            <input type="text" class="search-box" placeholder="Search shortcuts..." id="searchBox">
            <div class="categories" id="categories">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="general">General</button>
                <button class="category-btn" data-category="edit">Edit</button>
                <button class="category-btn" data-category="display">Display</button>
                <button class="category-btn" data-category="animation">Animation</button>
            </div>
        </div>
    </header>
    
    <main class="main-content" id="mainContent">
        <!-- Essential shortcuts section -->
        <div class="essentials-section" id="essentialsSection">
            <div class="essentials-title">⭐ Most Useful</div>
            <div class="essentials-grid" id="essentialsGrid"></div>
        </div>
        
        <!-- All shortcuts grid -->
        <div class="shortcuts-grid" id="shortcutsGrid"></div>
    </main>

    <script>
        // Shortcut data
        const shortcuts = [
            { name: "Extrude", keys: ["E"], desc: "Push faces outward", category: "edit", longform: "Select faces and press E to extrude them outward. Move mouse to control distance." },
            { name: "Inset", keys: ["I"], desc: "Create inner faces", category: "edit", longform: "Press I to create an inset of selected faces. Useful for adding detail." },
            { name: "Loop Cut", keys: ["Ctrl", "R"], desc: "Add edge loops", category: "edit", longform: "Press Ctrl+R to add edge loops. Scroll to increase cuts, click to confirm." },
            { name: "Bevel", keys: ["Ctrl", "B"], desc: "Round sharp edges", category: "edit", longform: "Select edges and press Ctrl+B to bevel. Scroll for more segments." },
            { name: "Select All", keys: ["Ctrl", "A"], desc: "Select everything", category: "general" },
            { name: "Deselect", keys: ["Alt", "A"], desc: "Clear selection", category: "general" },
            { name: "Undo", keys: ["Ctrl", "Z"], desc: "Reverse last action", category: "general" },
            { name: "Redo", keys: ["Ctrl", "Shift", "Z"], desc: "Restore undone action", category: "general" },
            { name: "Save", keys: ["Ctrl", "S"], desc: "Save project", category: "general" },
            { name: "Toggle Wireframe", keys: ["Z"], desc: "Show/hide wireframe", category: "display" },
            { name: "Focus Selected", keys: ["."], desc: "Center view on selection", category: "display" },
            { name: "Delete", keys: ["X"], desc: "Remove selected", category: "general" }
        ];

        const essentials = ["Extrude", "Inset", "Loop Cut", "Bevel", "Select All", "Undo", "Save", "Focus Selected"];

        // Render functions
        function renderKeys(keys) {
            return keys.map(k => `<span class="key">${k}</span>`).join('');
        }

        function createCard(shortcut) {
            const isEssential = essentials.includes(shortcut.name);
            return `
                <div class="shortcut-card" data-category="${shortcut.category}" data-name="${shortcut.name.toLowerCase()}">
                    <div class="demo-container">
                        <div class="icon-base icon-${shortcut.name.toLowerCase().replace(/\s+/g, '')}"></div>
                    </div>
                    <div class="card-content">
                        <div class="card-header">
                            <div class="shortcut-name">${shortcut.name}</div>
                            <span class="shortcut-category">${shortcut.category}</span>
                        </div>
                        <div class="keys-container">${renderKeys(shortcut.keys)}</div>
                        <div class="description">${shortcut.desc}</div>
                        ${shortcut.longform ? `
                            <div class="longform" id="longform-${shortcut.name.replace(/\s+/g, '')}">
                                <div class="longform-label">How to use</div>
                                <div class="longform-text">${shortcut.longform}</div>
                            </div>
                            <button class="toggle-btn" onclick="toggleLongform('${shortcut.name.replace(/\s+/g, '')}')">Show More</button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function toggleLongform(name) {
            const el = document.getElementById('longform-' + name);
            el.classList.toggle('show');
            event.target.textContent = el.classList.contains('show') ? 'Show Less' : 'Show More';
        }

        function filterShortcuts() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const category = document.querySelector('.category-btn.active').dataset.category;
            
            document.querySelectorAll('.shortcut-card').forEach(card => {
                const name = card.dataset.name;
                const cat = card.dataset.category;
                const matchesSearch = name.includes(search);
                const matchesCategory = category === 'all' || cat === category;
                card.style.display = matchesSearch && matchesCategory ? 'block' : 'none';
            });
        }

        // Initialize
        document.getElementById('shortcutsGrid').innerHTML = shortcuts.map(createCard).join('');
        document.getElementById('essentialsGrid').innerHTML = shortcuts.filter(s => essentials.includes(s.name)).map(createCard).join('');

        // Event listeners
        document.getElementById('searchBox').addEventListener('input', filterShortcuts);
        document.getElementById('categories').addEventListener('click', e => {
            if (e.target.classList.contains('category-btn')) {
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                filterShortcuts();
            }
        });
    </script>
</body>
</html>
