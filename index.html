<!DOCTYPE html>
<html>
<head>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }
    
    /* Header */
    .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #334155;
        z-index: 100;
        padding: 1rem;
    }
    
    .header-content {
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .title {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
    }
    
    .subtitle {
        font-size: 0.875rem;
        color: #64748b;
        margin-bottom: 1rem;
    }
    
    /* Search */
    .search-box {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #1e293b;
        border: 1px solid #475569;
        border-radius: 0.5rem;
        color: #e2e8f0;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
    }
    
    .search-box:focus {
        border-color: #3b82f6;
    }
    
    .search-box::placeholder {
        color: #64748b;
    }
    
    /* Categories */
    .categories {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
        overflow-x: auto;
        padding-bottom: 0.5rem;
        scrollbar-width: none;
    }
    
    .categories::-webkit-scrollbar {
        display: none;
    }
    
    .category-btn {
        padding: 0.5rem 1rem;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 9999px;
        color: #94a3b8;
        font-size: 0.875rem;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
    }
    
    .category-btn:hover {
        background: #334155;
        color: #e2e8f0;
    }
    
    .category-btn.active {
        background: #3b82f6;
        color: white;
        border-color: #3b82f6;
    }
    
    .category-btn.essential {
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        color: white;
        border-color: transparent;
        font-weight: 600;
    }
    
    .category-btn.essential:hover {
        background: linear-gradient(135deg, #fbbf24, #f87171);
    }
    
    .category-btn.essential.active {
        background: linear-gradient(135deg, #fbbf24, #f87171);
        box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
    }
    
    /* Main Content - Scrollable Area */
    .main-content {
        margin-top: 180px;
        padding: 1rem;
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
        padding-bottom: 2rem;
    }
    
    /* Shortcut Cards */
    .shortcuts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 1rem;
    }
    
    .shortcut-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.75rem;
        overflow: hidden;
        transition: all 0.2s;
        cursor: pointer;
    }
    
    .shortcut-card:hover {
        border-color: #3b82f6;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
    
    /* Icon Container */
    .icon-container {
        height: 120px;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        border-bottom: 1px solid #334155;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .icon-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s;
    }
    
    .shortcut-card:hover .icon-container::before {
        opacity: 1;
    }
    
    .shortcut-icon {
        width: 48px;
        height: 48px;
        color: #3b82f6;
        stroke-width: 1.5;
        transition: all 0.3s ease;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
    }
    
    .shortcut-card:hover .shortcut-icon {
        transform: scale(1.1);
        color: #60a5fa;
        filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
    }
    
    /* Category-specific icon colors */
    .category-general .shortcut-icon { color: #3b82f6; }
    .category-general .shortcut-card:hover .shortcut-icon { color: #60a5fa; }
    
    .category-tools .shortcut-icon { color: #22c55e; }
    .category-tools .shortcut-card:hover .shortcut-icon { color: #4ade80; }
    
    .category-paint .shortcut-icon { color: #a855f7; }
    .category-paint .shortcut-card:hover .shortcut-icon { color: #c084fc; }
    
    .category-animate .shortcut-icon { color: #f59e0b; }
    .category-animate .shortcut-card:hover .shortcut-icon { color: #fbbf24; }
    
    .category-viewport .shortcut-icon { color: #06b6d4; }
    .category-viewport .shortcut-card:hover .shortcut-icon { color: #22d3ee; }
    
    .category-uv .shortcut-icon { color: #ec4899; }
    .category-uv .shortcut-card:hover .shortcut-icon { color: #f472b6; }
    
    .category-outliner .shortcut-icon { color: #14b8a6; }
    .category-outliner .shortcut-card:hover .shortcut-icon { color: #2dd4bf; }
    
    /* Essential/Best shortcuts special styling */
    .category-essential .shortcut-icon { 
        color: #f59e0b; 
        filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.4));
    }
    .category-essential .shortcut-card:hover .shortcut-icon { 
        color: #fbbf24; 
        filter: drop-shadow(0 0 25px rgba(245, 158, 11, 0.6));
    }
    .category-essential .shortcut-card {
        border-color: rgba(245, 158, 11, 0.3);
        background: linear-gradient(135deg, #1e293b 0%, #1a1f2e 100%);
    }
    .category-essential .shortcut-card:hover {
        border-color: #f59e0b;
        box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.2);
    }
    .category-essential .shortcut-category {
        background: rgba(245, 158, 11, 0.2);
        color: #fbbf24;
    }
    
    .card-content {
        padding: 1.25rem;
    }
    
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.75rem;
    }
    
    .shortcut-name {
        font-size: 1.125rem;
        font-weight: 600;
        color: #f8fafc;
    }
    
    .shortcut-category {
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
        background: rgba(59, 130, 246, 0.2);
        color: #60a5fa;
        border-radius: 0.25rem;
        text-transform: uppercase;
        font-weight: 600;
    }
    
    .keys-container {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
    }
    
    .key {
        padding: 0.25rem 0.5rem;
        background: #0f172a;
        border: 1px solid #475569;
        border-radius: 0.375rem;
        font-family: 'Courier New', monospace;
        font-size: 0.875rem;
        font-weight: 700;
        color: #22d3ee;
        box-shadow: 0 2px 0 #0f172a;
    }
    
    .description {
        color: #94a3b8;
        font-size: 0.875rem;
        line-height: 1.5;
        margin-bottom: 0.75rem;
    }
    
    .context-note {
        color: #fbbf24;
        font-size: 0.75rem;
        font-style: italic;
        margin-top: 0.5rem;
        padding: 0.25rem 0.5rem;
        background: rgba(245, 158, 11, 0.1);
        border-radius: 0.25rem;
        border-left: 2px solid #f59e0b;
    }
    
    .longform {
        display: none;
        padding-top: 0.75rem;
        border-top: 1px solid #334155;
        margin-top: 0.75rem;
    }
    
    .longform.show {
        display: block;
    }
    
    .longform-label {
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 0.25rem;
    }
    
    .longform-text {
        font-size: 0.875rem;
        color: #cbd5e1;
        line-height: 1.5;
    }
    
    .toggle-btn {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.75rem;
        background: #334155;
        border: none;
        border-radius: 0.375rem;
        color: #94a3b8;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .toggle-btn:hover {
        background: #475569;
        color: #e2e8f0;
    }
    
    /* Essential badge */
    .essential-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.7rem;
        padding: 0.125rem 0.375rem;
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        color: white;
        border-radius: 0.25rem;
        margin-left: 0.5rem;
        font-weight: 700;
        text-transform: uppercase;
    }
    
    /* Empty State */
    .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: #64748b;
    }
    
    .empty-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .shortcuts-grid {
            grid-template-columns: 1fr;
        }
        
        .main-content {
            margin-top: 200px;
        }
    }
    
    /* Total count display */
    .count-display {
        text-align: center;
        padding: 1rem;
        color: #64748b;
        font-size: 0.875rem;
        margin-top: 1rem;
    }
</style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="title">Blockbench Shortcuts</div>
        <div class="subtitle">96 verified core Blockbench shortcuts (no plugins)</div>
        
        <input 
            type="text" 
            class="search-box"

            autocomplete="off"
        >
        
        <div class="categories" id="categories">
            <button class="category-btn essential active" onclick="filterCategory('essential')">⭐ Most Useful</button>
            <button class="category-btn" onclick="filterCategory('all')">All</button>
            <button class="category-btn" onclick="filterCategory('general')">General</button>
            <button class="category-btn" onclick="filterCategory('tools')">Tools</button>
            <button class="category-btn" onclick="filterCategory('paint')">Paint Mode</button>
            <button class="category-btn" onclick="filterCategory('animate')">Animate Mode</button>
            <button class="category-btn" onclick="filterCategory('viewport')">Viewport</button>
            <button class="category-btn" onclick="filterCategory('uv')">UV Editor</button>
            <button class="category-btn" onclick="filterCategory('outliner')">Outliner</button>
        </div>
    </div>
</div>

<main class="main-content">
    <div id="shortcutsContainer" class="shortcuts-grid"></div>
    <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-icon">🔍</div>
        <h3>No shortcuts found</h3>
        <p>Try a different search term</p>
    </div>
    <div class="count-display" id="countDisplay"></div>
</main>

        { name: "Front View", keys: ["Numpad", "1"], category: "viewport", desc: "Front orthographic view", longform: "View menu", icon: "arrow-up" },
        { name: "Top View", keys: ["Numpad", "7"], category: "viewport", desc: "Top orthographic view", longform: "View menu", icon: "arrow-down" },
        { name: "Side View", keys: ["Numpad", "3"], category: "viewport", desc: "Side orthographic view", longform: "View menu", icon: "arrow-right" },
        { name: "Zoom", keys: ["Scroll"], category: "viewport", desc: "Zoom in/out", longform: "Scroll wheel", icon: "zoom-in" },
        { name: "Orbit Camera", keys: ["Middle", "Drag"], category: "viewport", desc: "Rotate camera around model", longform: "Middle click + drag", icon: "rotate-3d" },
        { name: "Pan Camera", keys: ["Right", "Drag"], category: "viewport", desc: "Pan camera view", longform: "Right click + drag", icon: "move" },

        // UV EDITOR (8 shortcuts)
        { name: "Toggle UV Editor", keys: ["U"], category: "uv", desc: "Open/close UV editor", longform: "Window menu", icon: "layout-template" },
        { name: "Rotate UV 90°", keys: ["R"], category: "uv", desc: "Rotate UV by 90 degrees", longform: "UV Editor → Rotate", icon: "rotate-cw" },
        { name: "Flip UV Horizontal", keys: ["H"], category: "uv", desc: "Flip UV horizontally", longform: "UV Editor → Flip H", icon: "flip-horizontal" },
        { name: "Flip UV Vertical", keys: ["V"], category: "uv", desc: "Flip UV vertically", longform: "UV Editor → Flip V", icon: "flip-vertical" },
        { name: "Copy UV", keys: ["Ctrl", "Alt", "C"], category: "uv", desc: "Copy UV map", longform: "UV Editor", icon: "copy" },
        { name: "Paste UV", keys: ["Ctrl", "Alt", "V"], category: "uv", desc: "Paste UV map", longform: "UV Editor", icon: "clipboard-paste" },
        { name: "Nudge UV 1px", keys: ["Arrows"], category: "uv", desc: "Move UV by 1 pixel", longform: "Arrow keys in UV Editor", icon: "move" },
        { name: "Auto UV", keys: ["A"], category: "uv", desc: "Auto-generate UV mapping", longform: "UV Editor → Auto UV", icon: "sparkles" },

        // OUTLINER (7 shortcuts)
        { name: "Group Selection", keys: ["Ctrl", "G"], category: "outliner", desc: "Group selected elements", longform: "Outliner → Group", icon: "folder" },
        { name: "Wrap in Group", keys: ["Ctrl", "Shift", "G"], category: "outliner", desc: "Wrap selection in new group", longform: "Outliner → Wrap in Group", icon: "folder-plus" },
        { name: "Ungroup", keys: ["Ctrl", "Shift", "U"], category: "outliner", desc: "Ungroup selected group", longform: "Outliner → Ungroup", icon: "folder-minus" },
        { name: "Move Up", keys: ["PageUp"], category: "outliner", desc: "Move up in outliner", longform: "Outliner navigation", icon: "arrow-up" },
        { name: "Move Down", keys: ["PageDown"], category: "outliner", desc: "Move down in outliner", longform: "Outliner navigation", icon: "arrow-down" },
        { name: "Move to Top", keys: ["Home"], category: "outliner", desc: "Move to top of outliner", longform: "Outliner navigation", icon: "arrow-up-to-line" },
        { name: "Move to Bottom", keys: ["End"], category: "outliner", desc: "Move to bottom of outliner", longform: "Outliner navigation", icon: "arrow-down-to-line" }
    ];

    console.log('Total shortcuts loaded:', shortcuts.length);

    let currentCategory = 'essential';
    let searchTerm = '';

    function renderShortcuts() {
        const container = document.getElementById('shortcutsContainer');
        const emptyState = document.getElementById('emptyState');
        const countDisplay = document.getElementById('countDisplay');
        
        console.log('Current category:', currentCategory);
        console.log('Search term:', searchTerm);
        
        let filtered = shortcuts.filter(s => {
            // For "all", show everything
            // For "essential", show only essential ones
            // For other categories, match the category
            let matchesCategory;
            if (currentCategory === 'all') {
                matchesCategory = true;
            } else if (currentCategory === 'essential') {
                matchesCategory = s.essential === true;
            } else {
                matchesCategory = s.category === currentCategory;
            }
            
            const matchesSearch = searchTerm === '' || 
                s.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                s.keys.join(' ').toLowerCase().includes(searchTerm.toLowerCase()) ||
                s.desc.toLowerCase().includes(searchTerm.toLowerCase());
            
            return matchesCategory && matchesSearch;
        });

        console.log('Filtered count:', filtered.length);

        if (filtered.length === 0) {
            container.innerHTML = '';
            emptyState.style.display = 'block';
            countDisplay.textContent = '';
            return;
        }
        
        emptyState.style.display = 'none';
        
        // Update count display
        let totalInCategory;
        if (currentCategory === 'all') {
            totalInCategory = shortcuts.length;
        } else if (currentCategory === 'essential') {
            totalInCategory = shortcuts.filter(s => s.essential).length;
        } else {
            totalInCategory = shortcuts.filter(s => s.category === currentCategory).length;
        }
        
        countDisplay.textContent = `Showing ${filtered.length} of ${totalInCategory} shortcuts`;
        
        container.innerHTML = filtered.map(s => `
            <div class="shortcut-card category-${s.category}" onclick="toggleLongform(this)">
                <div class="icon-container">
                    <i data-lucide="${s.icon}" class="shortcut-icon"></i>
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <span class="shortcut-name">
                            ${s.name}
                            ${s.essential ? '<span class="essential-badge">★ Essential</span>' : ''}
                        </span>
                        <span class="shortcut-category">${s.category}</span>
                    </div>
                    <div class="keys-container">
                        ${s.keys.map(k => `<span class="key">${k}</span>`).join('')}
                    </div>
                    <div class="description">${s.desc}</div>
                    ${s.context ? `<div class="context-note">Context: ${s.context}</div>` : ''}
                    <div class="longform">
                        <div class="longform-label">Menu Method (No Shortcut)</div>
                        <div class="longform-text">${s.longform}</div>
                    </div>
                    <button class="toggle-btn" onclick="event.stopPropagation(); toggleLongform(this.parentElement.parentElement)">
                        Click to see menu method
                    </button>
                </div>
            </div>
        `).join('');
        
        // Initialize Lucide icons
        lucide.createIcons();
    }

    function toggleLongform(card) {
        const longform = card.querySelector('.longform');
        const btn = card.querySelector('.toggle-btn');
        
        if (longform.classList.contains('show')) {
            longform.classList.remove('show');
            btn.textContent = 'Click to see menu method';
        } else {
            // Close others
            document.querySelectorAll('.longform').forEach(l => l.classList.remove('show'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = 'Click to see menu method');
            
            longform.classList.add('show');
            btn.textContent = 'Hide menu method';
        }
    }

    function filterCategory(cat) {
        currentCategory = cat;
        
        // Update buttons
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.remove('active');
            if (cat === 'essential' && btn.textContent.includes('Most Useful')) {
                btn.classList.add('active');
            } else if (cat !== 'essential' && btn.textContent.toLowerCase().includes(cat === 'all' ? 'all' : cat)) {
                btn.classList.add('active');
            }
        });
        
        renderShortcuts();
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderShortcuts();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        // Focus search on /
        if (e.key === '/' && document.activeElement.id !== 'searchInput') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
        
        // Escape to close longforms
        if (e.key === 'Escape') {
            document.querySelectorAll('.longform').forEach(l => l.classList.remove('show'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = 'Click to see menu method');
            document.getElementById('searchInput').blur();
        }
    });

    // Initial render
    renderShortcuts();
</script>

</body>
</html>
